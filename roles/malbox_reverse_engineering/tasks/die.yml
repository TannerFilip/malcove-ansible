---
- name: sub | Get latest Detect-It-Easy release info
  ansible.builtin.uri:
    url: https://api.github.com/repos/horsicq/DIE-engine/releases/latest
    return_content: true
  register: __malbox_reverse_engineering_die_release
  tags: malbox_reverse_engineering

- name: sub | Set DIE version fact
  ansible.builtin.set_fact:
    __malbox_reverse_engineering_die_version: >-
      {{ (__malbox_reverse_engineering_die_release.content | from_json).tag_name }}
  tags: malbox_reverse_engineering

- name: sub | Create DIE install directory
  ansible.builtin.file:
    path: "{{ malbox_reverse_engineering_install_dir }}/die"
    state: directory
    mode: "0755"
  tags: malbox_reverse_engineering

- name: sub | Download and extract DIE portable archive
  ansible.builtin.unarchive:
    src: >-
      https://github.com/horsicq/DIE-engine/releases/download/{{ __malbox_reverse_engineering_die_version
      }}/die_lin64_portable_{{ __malbox_reverse_engineering_die_version }}.tar.gz
    dest: "{{ malbox_reverse_engineering_install_dir }}/die"
    remote_src: true
    extra_opts:
      - "--strip-components=1"
  tags: malbox_reverse_engineering

- name: sub | Symlink diec to /usr/local/bin
  ansible.builtin.file:
    src: "{{ malbox_reverse_engineering_install_dir }}/die/diec"
    dest: "/usr/local/bin/{{ item }}"
    state: link
    force: true
  loop:
    - die
    - diec
  tags: malbox_reverse_engineering
