---
- name: Malbox_base | Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags: always

- name: Malbox_base | Install base utilities
  ansible.builtin.apt:
    name: "{{ __malbox_base_packages }}"
    state: present
  tags: malbox_base

- name: Malbox_base | Symlink batcat to bat
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
    force: true
  tags: malbox_base

- name: Malbox_base | Configure shell aliases and PATH
  ansible.builtin.blockinfile:
    path: "{{ malbox_base_bashrc_path }}"
    marker: "# {mark} mal-box aliases"
    block: |
      alias ll='ls -lah'
      alias strings='strings -a'
      export PATH="{{ malbox_base_install_dir }}/die:$PATH"
  tags: malbox_base
